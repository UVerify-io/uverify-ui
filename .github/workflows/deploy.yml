name: 🥁 Deploy uverify-ui
on:
  workflow_dispatch:
    inputs:
      network:
        description: 'Target network'
        required: true
        default: 'mainnet'
        type: choice
        options:
          - mainnet
          - preprod

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v4

      - name: 🫡 Setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: 📝 Set mainnet secrets
        if: inputs.network == 'mainnet'
        run: |
          echo "BACKEND_URL=https://api.uverify.io" >> $GITHUB_ENV
          echo "SERVICE_ACCOUNT=${{ secrets.UVERIFY_SERVICE_MAINNET_ACCOUNT }}" >> $GITHUB_ENV
          echo "FIREBASE_PROJECT=${{ secrets.FIREBASE_PROJECT_MAINNET }}" >> $GITHUB_ENV
          echo "FIREBASE_SITE=${{ secrets.FIREBASE_SITE_MAINNET }}" >> $GITHUB_ENV
          echo "FIREBASE_SA=${{ secrets.FIREBASE_SERVICE_ACCOUNT_MAINNET }}" >> $GITHUB_ENV

      - name: 📝 Set preprod secrets
        if: inputs.network == 'preprod'
        run: |
          echo "BACKEND_URL=https://api.preprod.uverify.io" >> $GITHUB_ENV
          echo "SERVICE_ACCOUNT=${{ secrets.UVERIFY_SERVICE_PREPROD_ACCOUNT }}" >> $GITHUB_ENV
          echo "FIREBASE_PROJECT=${{ secrets.FIREBASE_PROJECT_PREPROD }}" >> $GITHUB_ENV
          echo "FIREBASE_SITE=${{ secrets.FIREBASE_SITE_PREPROD }}" >> $GITHUB_ENV
          echo "FIREBASE_SA=${{ secrets.FIREBASE_SERVICE_ACCOUNT_PREPROD }}" >> $GITHUB_ENV

      - name: 📝 Write .env file
        run: |
          echo 'VITE_VERSION=$npm_package_version' > .env
          echo "VITE_BACKEND_URL=${{ env.BACKEND_URL }}" >> .env
          echo "VITE_CARDANO_NETWORK=${{ inputs.network }}" >> .env
          echo "VITE_SERVICE_ACCOUNT=${{ env.SERVICE_ACCOUNT }}" >> .env

      - name: 📝 Create .firebaserc file
        run: |
          echo '{
            "projects": {
              "default": "${{ env.FIREBASE_PROJECT }}"
            }
          }' > .firebaserc

      - name: 📝 Create firebase.json file
        run: |
          echo '{
            "hosting": {
              "public": "dist",
              "site": "${{ env.FIREBASE_SITE }}",
              "ignore": [
                "firebase.json",
                "**/.*",
                "**/node_modules/**"
              ],
              "rewrites": [
                {
                  "source": "**",
                  "destination": "/index.html"
                }
              ]
            }
          }' > firebase.json

      - name: 🔨 Download dependencies and build hosting
        run: npm ci && npm run build

      - name: 🦺 Install Playwright browsers
        run: npx playwright install --with-deps
      - name: Run Playwright tests
        run: npx playwright test

      - name: 🚀 Deploy to Firebase hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ env.FIREBASE_SA }}'
          channelId: live
          projectId: ${{ env.FIREBASE_PROJECT }}
