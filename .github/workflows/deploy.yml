name: 🥁 Deploy uverify-ui
on:
  workflow_dispatch:
    inputs:
      network:
        description: 'Target network'
        required: true
        default: 'mainnet'
        type: choice
        options:
          - mainnet
          - preprod
          - both

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      networks: ${{ steps.set-networks.outputs.networks }}
    steps:
      - name: 🎯 Resolve target networks
        id: set-networks
        run: |
          if [ "${{ inputs.network }}" == "both" ]; then
            echo 'networks=["mainnet","preprod"]' >> $GITHUB_OUTPUT
          else
            echo 'networks=["${{ inputs.network }}"]' >> $GITHUB_OUTPUT
          fi

  deploy:
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      matrix:
        network: ${{ fromJSON(needs.setup.outputs.networks) }}
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v4

      - name: 🫡 Setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: 📝 Set mainnet site
        if: matrix.network == 'mainnet'
        run: |
          echo "BACKEND_URL=https://api.uverify.io" >> $GITHUB_ENV
          echo "FIREBASE_SITE=${{ secrets.FIREBASE_SITE_MAINNET }}" >> $GITHUB_ENV

      - name: 📝 Set preprod site
        if: matrix.network == 'preprod'
        run: |
          echo "BACKEND_URL=https://api.preprod.uverify.io" >> $GITHUB_ENV
          echo "FIREBASE_SITE=${{ secrets.FIREBASE_SITE_PREPROD }}" >> $GITHUB_ENV

      - name: 📝 Write .env file
        run: |
          echo 'VITE_VERSION=$npm_package_version' > .env
          echo "VITE_BACKEND_URL=${{ env.BACKEND_URL }}" >> .env
          echo "VITE_CARDANO_NETWORK=${{ matrix.network }}" >> .env

      - name: 📝 Create .firebaserc file
        run: |
          echo '{
            "projects": {
              "default": "${{ secrets.FIREBASE_PROJECT }}"
            }
          }' > .firebaserc

      - name: 📝 Create firebase.json file
        run: |
          echo '{
            "hosting": {
              "public": "dist",
              "site": "${{ env.FIREBASE_SITE }}",
              "ignore": [
                "firebase.json",
                "**/.*",
                "**/node_modules/**"
              ],
              "rewrites": [
                {
                  "source": "**",
                  "destination": "/index.html"
                }
              ]
            }
          }' > firebase.json

      - name: 🔨 Download dependencies and build hosting
        run: npm ci && npm run build

      - name: 🦺 Install Playwright browsers
        run: npx playwright install --with-deps
      - name: Run Playwright tests
        run: npx playwright test

      - name: 🚀 Deploy to Firebase hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_UVERIFY_477FB }}'
          channelId: live
          projectId: ${{ secrets.FIREBASE_PROJECT }}
